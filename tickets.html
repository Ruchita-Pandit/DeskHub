<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskHub - Tickets</title>
    <link rel="stylesheet" href="./public/styles/main.css">
</head>
<body data-page="tickets-list">
    <header class="dashboard-header">
        <h1>DeskHub - Tickets</h1>
        <nav class="header-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="tickets.html" class="active">Tickets</a>
            <button type="button" id="logoutBtn" class="btn-secondary">Logout</button>
        </nav>
    </header>

    <main class="tickets-main">
        <section class="tickets-controls">
            <div class="search-section">
                <label for="searchInput" class="sr-only">Search tickets</label>
                <input type="search" id="searchInput" placeholder="Search tickets..." class="search-input">
            </div>

            <div class="filters-section">
                <div class="filter-group">
                    <label for="statusFilter">Status</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="">All Status</option>
                        <option value="open">Open</option>
                        <option value="in-progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="priorityFilter">Priority</label>
                    <select id="priorityFilter" class="filter-select">
                        <option value="">All Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sortSelect">Sort by date</label>
                    <select id="sortSelect" class="filter-select">
                        <option value="desc">Newest first</option>
                        <option value="asc">Oldest first</option>
                    </select>
                </div>
            </div>

            <div class="actions-section">
                <button type="button" id="newTicketBtn" class="btn-primary">New ticket</button>
            </div>
        </section>

        <div id="loadingState" class="loading-state" role="status" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p class="loading-text">Loading tickets…</p>
        </div>

        <div id="errorState" class="error-state hidden" role="alert">
            <div class="error-state-inner">
                <p class="error-text">Failed to load tickets.</p>
                <button type="button" id="retryBtn" class="btn-secondary">Retry</button>
            </div>
        </div>

        <div id="ticketsContainer" class="tickets-section hidden">
            <table id="tickets-table" class="tickets-table">
                <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Title</th>
                        <th scope="col">Customer</th>
                        <th scope="col">Priority</th>
                        <th scope="col">Status</th>
                        <th scope="col">Created</th>
                    </tr>
                </thead>
                <tbody id="ticketTableBody"></tbody>
            </table>

            <div id="emptyState" class="empty-state hidden" role="status" aria-live="polite">
                <h3>No tickets found</h3>
                <p>Try adjusting your search or filter criteria.</p>
            </div>
        </div>

        <section id="pagination" class="pagination hidden"></section>
    </main>

    <script type="module" src="./public/src/main.js"></script>
</body>
</html>
