<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskHub - Tickets</title>
    <link rel="stylesheet" href="./public/styles/main.css">
</head>
<body data-page="tickets-list">
    <header class="dashboard-header">
        <h1>DeskHub - Tickets</h1>
        <nav class="header-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="ticket.html" class="active">Tickets</a>
            <button type="button" id="logout-btn" class="btn-secondary">Logout</button>
        </nav>
    </header>

    <main class="tickets-main">
       
        <section class="tickets-controls">
            <div class="search-section">
                <label for="search-input" class="sr-only">Search tickets</label>
                <input type="search" id="search-input" placeholder="Search tickets..." class="search-input">
            </div>

            <div class="filters-section">
                <div class="filter-group">
                    <label for="filter-status">Status</label>
                    <select id="filter-status" class="filter-select">
                        <option value="">All Status</option>
                        <option value="open">Open</option>
                        <option value="in-progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-priority">Priority</label>
                    <select id="filter-priority" class="filter-select">
                        <option value="">All Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-assignee">Assignee</label>
                    <select id="filter-assignee" class="filter-select">
                        <option value="">All Assignees</option>
                        
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sort-by">Sort By</label>
                    <select id="sort-by" class="filter-select">
                        <option value="createdAt">Date Created</option>
                        <option value="updatedAt">Last Updated</option>
                        <option value="priority">Priority</option>
                        <option value="status">Status</option>
                    </select>
                </div>
            </div>

            <div class="actions-section">
                <button type="button" id="filter-reset-btn" class="btn-secondary">Reset filters</button>
                <button type="button" id="export-csv-btn" class="btn-secondary">Export CSV</button>
                <button type="button" id="new-ticket-btn" class="btn-primary">New Ticket</button>
            </div>
        </section>

        
        <div id="loading" class="loading-state" hidden role="status" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p class="loading-text">Loading tickets…</p>
        </div>

        
        <div id="error" class="error-state" hidden role="alert">
            <div class="error-state-inner">
                <p id="error-text" class="error-text">Failed to load tickets.</p>
                <button type="button" id="error-retry" class="btn-secondary">Retry</button>
            </div>
        </div>

        <section class="tickets-section">
            <table id="tickets-table" class="tickets-table">
                <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Title</th>
                        <th scope="col">Customer</th>
                        <th scope="col">Priority</th>
                        <th scope="col">Status</th>
                        <th scope="col">Assignee</th>
                        <th scope="col">Created</th>
                    </tr>
                </thead>
                <tbody id="tickets-tbody">
                    
                </tbody>
            </table>

            
            <div id="empty-state" class="empty-state" hidden role="status" aria-live="polite">
                <h3>No tickets found</h3>
                <p>Try adjusting your search or filter criteria.</p>
            </div>
        </section>

        <nav id="pagination" class="pagination" aria-label="Tickets pagination">
            
        </nav>
    </main>

    <script type="module" src="./public/src/main.js"></script>
</body>
</html>
