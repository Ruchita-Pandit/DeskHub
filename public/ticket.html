<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DeskHub Tickets</title>

    <link rel="stylesheet"
          href="styles/main.css">

</head>

<body data-page="tickets-list">

    <header class="page-header">

        <h1>Support Tickets</h1>

        <button id="logoutBtn">
            Logout
        </button>

    </header>

    <main class="tickets-page">

        <div id="loadingState"
             class="loading-state">

            Loading tickets...
        </div>

        <div id="errorState"
             class="error-state hidden">

            <p>
                Failed to load tickets
            </p>

            <button id="retryBtn">
                Retry
            </button>

        </div>

        <div id="emptyState"
             class="empty-state hidden">

            No tickets found
        </div>

        <div id="tableContainer"
             class="hidden">

            <table class="tickets-table">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Customer</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Assignee</th>
                        <th>Created</th>
                    </tr>

                </thead>

                <tbody id="ticketsTableBody">

                </tbody>

            </table>

        </div>

    </main>

    <script type="module"
            src="../src/main.js">

    </script>

</body>
</html>
