<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskHub</title>
    <link rel="stylesheet" href="./public/styles/main.css">
</head>
<body data-page="login">
    <div class="login-container">
        <header class="login-header">
            <h1>DeskHub</h1>
            <p>Support Ticket Management</p>
        </header>

        <main class="login-main">
            <form id="login-form" class="login-form" method="post" action="#" novalidate>
                <fieldset>
                    <legend>Sign In</legend>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email" aria-describedby="login-error">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" aria-describedby="login-error">
                    </div>

                    <div id="login-error" class="login-error" aria-live="polite" hidden>

                    </div>

                    <button type="submit" class="login-submit" id="login-submit">Sign In</button>
                </fieldset>
            </form>
        </main>
    </div>

    <script type="module" src="./public/src/main.js"></script>
</body>
</html>
